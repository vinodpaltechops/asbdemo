name: app-ci

on:
  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/app-ci.yml"
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/app-ci.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

env:
  ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: meta
        run: echo "tag=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build orders image
        uses: docker/build-push-action@v6
        with:
          context: app
          file: app/orders-service/Dockerfile
          tags: ${{ env.ACR_LOGIN_SERVER }}/orders-service:${{ steps.meta.outputs.tag }}
          load: true
          cache-from: type=gha,scope=orders
          cache-to: type=gha,mode=max,scope=orders

      - name: Build payments image
        uses: docker/build-push-action@v6
        with:
          context: app
          file: app/payments-service/Dockerfile
          tags: ${{ env.ACR_LOGIN_SERVER }}/payments-service:${{ steps.meta.outputs.tag }}
          load: true
          cache-from: type=gha,scope=payments
          cache-to: type=gha,mode=max,scope=payments

      - name: Trivy scan — orders
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          image-ref: ${{ env.ACR_LOGIN_SERVER }}/orders-service:${{ steps.meta.outputs.tag }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true

      - name: Trivy scan — payments
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          image-ref: ${{ env.ACR_LOGIN_SERVER }}/payments-service:${{ steps.meta.outputs.tag }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true

      - name: Azure login (OIDC)
        if: github.event_name == 'push'
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        if: github.event_name == 'push'
        run: az acr login --name "${ACR_LOGIN_SERVER%%.*}"

      - name: Push images to ACR
        if: github.event_name == 'push'
        run: |
          docker push "${ACR_LOGIN_SERVER}/orders-service:${{ steps.meta.outputs.tag }}"
          docker push "${ACR_LOGIN_SERVER}/payments-service:${{ steps.meta.outputs.tag }}"

  bump-gitops:
    needs: build-scan-push
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: "5.4.3"

      - name: Bump image tags
        working-directory: gitops/workloads/envs/dev
        env:
          TAG: ${{ needs.build-scan-push.outputs.image_tag }}
        run: |
          kustomize edit set image \
            "${ACR_LOGIN_SERVER}/orders-service=${ACR_LOGIN_SERVER}/orders-service:${TAG}"
          kustomize edit set image \
            "${ACR_LOGIN_SERVER}/payments-service=${ACR_LOGIN_SERVER}/payments-service:${TAG}"

      - name: Commit and push
        env:
          TAG: ${{ needs.build-scan-push.outputs.image_tag }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gitops/workloads/envs/dev/kustomization.yaml
          if git diff --staged --quiet; then
            echo "No image tag change; skipping commit."
            exit 0
          fi
          git commit -m "ci(gitops): bump images to ${TAG}"
          git push
