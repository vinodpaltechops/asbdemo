name: terraform

on:
  pull_request:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/terraform.yml"
  push:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  # Non-interactive HCP login
  TF_CLI_ARGS_init: "-input=false"
  TF_CLI_ARGS_plan: "-input=false -no-color"
  TF_CLI_ARGS_apply: "-input=false -no-color -auto-approve"
  WORKING_DIR: infra/envs/azure-dev

jobs:
  fmt-validate:
    # Swap to [self-hosted, linux, arc] if you want to use your ARC runner on EKS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.8"
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: terraform fmt
        run: terraform -chdir=${{ env.WORKING_DIR }} fmt -check -recursive
        working-directory: .

      - name: terraform init (backend=false for validate)
        run: terraform -chdir=${{ env.WORKING_DIR }} init -backend=false

      - name: terraform validate
        run: terraform -chdir=${{ env.WORKING_DIR }} validate

  plan:
    needs: fmt-validate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.8"
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: terraform init
        run: terraform -chdir=${{ env.WORKING_DIR }} init

      - name: terraform plan
        id: plan
        run: terraform -chdir=${{ env.WORKING_DIR }} plan -out=tfplan

      - name: Comment plan on PR
        uses: actions/github-script@v7
        if: always()
        env:
          PLAN_OUTCOME: ${{ steps.plan.outcome }}
        with:
          script: |
            const outcome = process.env.PLAN_OUTCOME;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `### Terraform plan (HCP workspace \`azure-dev\`)
            - Outcome: **${outcome}**
            - Full plan output: [view in HCP Terraform UI](https://app.terraform.io/app/vinod-techops-org/workspaces/azure-dev/runs)
            - GitHub Actions logs: ${runUrl}
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  apply:
    needs: fmt-validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: azure-dev    # set required reviewers in GitHub Environments to gate apply
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.8"
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: terraform init
        run: terraform -chdir=${{ env.WORKING_DIR }} init

      - name: terraform apply
        run: terraform -chdir=${{ env.WORKING_DIR }} apply
