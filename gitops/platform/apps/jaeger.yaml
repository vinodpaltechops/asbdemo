apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jaeger
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://jaegertracing.github.io/helm-charts
    chart: jaeger
    targetRevision: 4.7.0
    helm:
      releaseName: jaeger
      values: |
        provisionDataStore:
          cassandra: false
          elasticsearch: false
          kafka: false
        storage:
          type: memory
        allInOne:
          enabled: true
          extraEnv:
            - name: COLLECTOR_OTLP_ENABLED
              value: "true"
            - name: MEMORY_MAX_TRACES
              value: "50000"
          resources:
            requests: { cpu: "50m", memory: "256Mi" }
            limits:   { cpu: "300m", memory: "512Mi" }
        agent:
          enabled: false
        collector:
          enabled: false
        query:
          enabled: false
        cassandra:
          enabled: false
        elasticsearch:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: jaeger
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
