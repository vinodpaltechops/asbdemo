apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: workloads-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/vinodpaltechops/asbdemo.git
    targetRevision: main
    path: gitops/workloads/envs/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: asbdemo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
