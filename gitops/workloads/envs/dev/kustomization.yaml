apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: asbdemo

resources:
- namespace.yaml
- gateway.yaml
- prometheusrule.yaml
- grafana-dashboard.yaml
- ../../orders-service
- ../../payments-service

images:
- name: acrasbdemodevsin.azurecr.io/orders-service
  newName: acrasbdemodevsin.azurecr.io/orders-service
  newTag: af6c1ab
- name: acrasbdemodevsin.azurecr.io/payments-service
  newName: acrasbdemodevsin.azurecr.io/payments-service
  newTag: af6c1ab

labels:
- includeTemplates: true
  pairs:
    app.kubernetes.io/part-of: asbdemo
    env: dev
