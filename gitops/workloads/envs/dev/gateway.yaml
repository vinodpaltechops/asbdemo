apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: asbdemo-gateway
spec:
  gatewayClassName: nginx
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: orders
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: asbdemo-gateway
  hostnames:
    - orders.asbdemo.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /orders
      backendRefs:
        - group: ""
          kind: Service
          name: orders-service
          port: 80
          weight: 1