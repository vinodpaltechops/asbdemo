apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: orders-service
  labels:
    app.kubernetes.io/name: orders-service
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: orders-service
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
      scrapeTimeout: 10s
