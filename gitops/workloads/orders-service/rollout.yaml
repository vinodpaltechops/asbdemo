apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: orders-service
  labels:
    app.kubernetes.io/name: orders-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: orders-service
  strategy:
    canary:
      analysis:
        templates:
          - templateName: success-rate
        args:
          - name: service-name
            value: orders-service
        startingStep: 1
      steps:
        - setWeight: 25
        - pause: { duration: 30s }
        - setWeight: 50
        - pause: { duration: 30s }
        - setWeight: 75
        - pause: { duration: 30s }
  template:
    metadata:
      labels:
        app.kubernetes.io/name: orders-service
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: orders-sa
      terminationGracePeriodSeconds: 40
      containers:
        - name: orders-service
          image: acrasbdemodevsin.azurecr.io/orders-service:bootstrap
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: SERVICEBUS_NAMESPACE_FQDN
              value: "sb-asbdemo-dev-sin-znsc.servicebus.windows.net"
            - name: SERVICEBUS_QUEUE_NAME
              value: "orders"
            - name: OTEL_SERVICE_NAME
              value: "orders-service"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://jaeger-collector.jaeger.svc.cluster.local:4317"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "grpc"
            - name: OTEL_TRACES_EXPORTER
              value: "otlp"
            - name: OTEL_METRICS_EXPORTER
              value: "none"
            - name: OTEL_LOGS_EXPORTER
              value: "none"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "deployment.environment=dev,service.namespace=asbdemo"
          resources:
            requests:
              cpu: "100m"
              memory: "384Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            periodSeconds: 20
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "5"]
