# Build a single service image and scan it with Trivy.
# Loaded into the local Docker daemon so a separate pull isn't needed for scan.
parameters:
  - name: serviceName
    type: string
  - name: imageTag
    type: string
  - name: acrLoginServer
    type: string

steps:
  - task: Docker@2
    displayName: Build ${{ parameters.serviceName }}
    inputs:
      command: build
      Dockerfile: app/${{ parameters.serviceName }}/Dockerfile
      buildContext: app
      tags: ${{ parameters.imageTag }}
      repository: ${{ parameters.acrLoginServer }}/${{ parameters.serviceName }}
      arguments: --load

  - script: |
      set -euo pipefail
      curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
        | sh -s -- -b /usr/local/bin v0.56.2
      trivy image \
        --severity CRITICAL,HIGH \
        --ignore-unfixed \
        --exit-code 0 \
        --format table \
        "${{ parameters.acrLoginServer }}/${{ parameters.serviceName }}:${{ parameters.imageTag }}"
    displayName: Trivy scan ${{ parameters.serviceName }}
