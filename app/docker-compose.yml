services:
  payments:
    build:
      context: .
      dockerfile: payments-service/Dockerfile
    image: asbdemo/payments-service:local
    container_name: asbdemo-payments
    ports:
      - "8081:8080"
    environment:
      SERVICEBUS_NAMESPACE_FQDN: ${SERVICEBUS_NAMESPACE_FQDN}
      SERVICEBUS_QUEUE_NAME: ${SERVICEBUS_QUEUE_NAME:-orders}
      SPRING_PROFILES_ACTIVE: local
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET}
      AZURE_TENANT_ID: ${AZURE_TENANT_ID}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health/readiness || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 30s

  orders:
    build:
      context: .
      dockerfile: orders-service/Dockerfile
    image: asbdemo/orders-service:local
    container_name: asbdemo-orders
    ports:
      - "8080:8080"
    environment:
      SERVICEBUS_NAMESPACE_FQDN: ${SERVICEBUS_NAMESPACE_FQDN}
      SERVICEBUS_QUEUE_NAME: ${SERVICEBUS_QUEUE_NAME:-orders}
      SPRING_PROFILES_ACTIVE: local
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET}
      AZURE_TENANT_ID: ${AZURE_TENANT_ID}
    depends_on:
      payments:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health/readiness || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 30s
